name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run foundation checks
        run: npm run check

      - name: Verify single-proof dry run
        run: npm run proof:dry-run > /tmp/commentate-this-dry-run.txt

      - name: Verify OpenAI voice-audition plan
        run: |
          node scripts/generate-voice-audition.mjs --dry-run > /tmp/commentate-this-voice-audition.json
          node -e 'const proof = require("/tmp/commentate-this-voice-audition.json"); if (proof.voices.length < 3 || proof.calls !== proof.voices.length * 3) process.exit(1)'

      - name: Verify ElevenLabs Voice Library discovery plan
        run: |
          node scripts/generate-elevenlabs-audition.mjs --dry-run > /tmp/commentate-this-elevenlabs-library.json
          node -e 'const proof = require("/tmp/commentate-this-elevenlabs-library.json"); if (proof.endpoint !== "/v1/shared-voices" || proof.stage !== "shared_voice_library_discovery" || proof.mutatesVoiceCollection !== false || proof.nextCommand !== "npm run voice:elevenlabs:audition -- 1,2") process.exit(1)'

      - name: Verify ElevenLabs selected audition plan
        run: |
          node scripts/generate-elevenlabs-selected-audition.mjs --dry-run > /tmp/commentate-this-elevenlabs-selected.json
          node -e 'const proof = require("/tmp/commentate-this-elevenlabs-selected.json"); if (proof.stage !== "selected_expressive_audition" || proof.callsPerCandidate !== 3 || proof.mutatesVoiceCollection !== true || proof.preferredInvocation !== "npm run voice:elevenlabs:audition -- 1,3") process.exit(1)'

      - name: Verify ten-case proof-set plan
        run: |
          node scripts/generate-proof-set.mjs --dry-run > /tmp/commentate-this-proof-set.json
          node -e 'const proof = require("/tmp/commentate-this-proof-set.json"); if (proof.count !== 10 || proof.commands.length !== 10) process.exit(1)'
