name: Project control

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-project-control:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository control
        run: python scripts/validate_project_control.py --repository armpitpete/commentate-this
